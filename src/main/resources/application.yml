spring:
  application:
    name: my-microservice # Change for the proper ms instead

  # 1. Db config
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mi_base_de_datos}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update # Useful in dev, in prod envs use 'validate' or Flyway/Liquibase
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # 2. Redis config
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # password: ${REDIS_PASSWORD:} # Uncomment if redis has password enabled

  # 3. Kafka configuration
  kafka:
    bootstrap-servers: ${KAFKA_BROKER:localhost:9092}
    consumer:
      group-id: my-microservice-group # Consumer group identifier
      auto-offset-reset: earliest # If goes down, read the last one

# microservice configuration port
server:
  port: ${APP_PORT:8080}

# 4. Swagger / OpenAPI configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# 5. Actuator & Observability
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  # Prometheus metrics export
  prometheus:
    metrics:
      export:
        enabled: true
  # OTLP metrics export (to Grafana LGTM)
  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/metrics
        step: 10s
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
  # Tracing config
  tracing:
    sampling:
      probability: 1.0 # Sample 100% of requests (reduce in production)

# 6. Logging - include traceId/spanId in logs
logging:
  pattern:
    correlation: '[${spring.application.name:},%mdc{traceId:-},%mdc{spanId:-}] '

